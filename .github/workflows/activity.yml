name: Update README

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch: {}
  push:
    branches: [main]

jobs:
  update-activity:
    name: Update recent activity
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: Readme-Workflows/recent-activity@v2.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          USERNAME: Kristiyalno
          MAX_LINES: 5
          COMMIT_MSG: "chore: update recent activity"

  update-active-repos:
    name: Update active projects
    runs-on: ubuntu-latest
    needs: update-activity
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Generate active projects SVG and update README
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 generate_svg.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md active-projects.svg
          git diff --cached --quiet || git commit -m "chore: update active projects"
          git push