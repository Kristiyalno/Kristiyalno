<svg xmlns="http://www.w3.org/2000/svg" width="260" height="228" viewBox="0 0 260 228"><defs><linearGradient id="grad" x1="0" y1="0" x2="1" y2="1"><stop offset="0%"><animate attributeName="stop-color" values="#7c3aed;#a855f7;#6366f1;#a855f7;#7c3aed" dur="8s" begin="0s" repeatCount="indefinite"/></stop><stop offset="100%"><animate attributeName="stop-color" values="#6366f1;#7c3aed;#a855f7;#7c3aed;#6366f1" dur="8s" begin="0s" repeatCount="indefinite"/></stop></linearGradient></defs><rect width="260" height="228" rx="14" fill="#0d1117"/><rect width="260" height="228" rx="14" fill="url(#grad)" opacity="0.18"/><rect width="260" height="228" rx="14" fill="none" stroke="url(#grad)" stroke-width="1.5" opacity="0.6"/><text x="18" y="36" font-family="'Segoe UI',system-ui,sans-serif" font-size="14" font-weight="700" fill="#f8f8f2">SAM-Idler</text><text x="18" y="62" font-family="'Segoe UI',system-ui,sans-serif" font-size="11" fill="#bd93f9" font-weight="500">last push: 2026-07-19</text><text x="18" y="84" font-family="'Segoe UI',system-ui,sans-serif" font-size="11" fill="#ccc9d0">Python/Tkinter frontend for</text><text x="18" y="100" font-family="'Segoe UI',system-ui,sans-serif" font-size="11" fill="#ccc9d0">idle-farming Steam trading cards</text><text x="18" y="116" font-family="'Segoe UI',system-ui,sans-serif" font-size="11" fill="#ccc9d0">using SAM.Game.exe. Runs sub-2h</text><text x="18" y="132" font-family="'Segoe UI',system-ui,sans-serif" font-size="11" fill="#ccc9d0">games in parallel until the refund</text><text x="18" y="148" font-family="'Segoe UI',system-ui,sans-serif" font-size="11" fill="#ccc9d0">window passes, then idles each game</text><text x="18" y="164" font-family="'Segoe UI',system-ui,sans-serif" font-size="11" fill="#ccc9d0">solo until you confirm cards have</text><text x="18" y="180" font-family="'Segoe UI',system-ui,sans-serif" font-size="11" fill="#ccc9d0">dropped.</text></svg>